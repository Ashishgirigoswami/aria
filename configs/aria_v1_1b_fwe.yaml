# ARIA v1 1B — FineWeb-Edu + all research applied
# Preserves 2/3 novelty claims (shared MLA + joint-softmax fusion).
# Mamba-3 MIMO swap deferred to GPU run when grants arrive.
#
# Architecture scaled from 131M per SmolLM2 aspect ratios.
# Data mix from cycle 3 + cycle 9 research (FineWeb-Edu dominant).
# WSD schedule + ckpt_every=200 per preemption learnings.

model:
  name: lsa                          # v1 = xla_scan-compatible on TPU
  vocab_size: 50257
  d_model: 2048                      # 2.7x scale from 768 (131M)
  n_layers: 24                       # 2x layers
  n_heads: 16                        # d_head still 128
  d_head: 128
  d_ff: 5504                         # ~2.7x d_model (SwiGLU)
  d_kv_latent: 1024                  # shared MLA latent (core novelty)
  d_state: 256                       # vector SSM state
  max_seq_len: 1024                  # 4x longer context
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true
  interleave_ratio: 3                # 3:1 attention:SSM per Qwen3-Next
  qk_norm: true                      # stability at 1B

data:
  dataset: fineweb-edu               # cycle 3 recommendation
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 1024
  train_split: 0.995
  max_train_tokens: 2000000000       # 2B tokens (Chinchilla-optimal for 1B)

training:
  batch_size: 4
  grad_accum_steps: 32               # effective batch 128
  max_steps: 60000                   # 60K steps × 128 × 1024 = 7.9B tokens (under-Chinchilla, realistic TRC budget)
  eval_every: 1000
  eval_iters: 100
  warmup_steps: 2000
  lr: 3.0e-4                         # scaled down from 6e-4 (rough sqrt/size rule until muP port)
  min_lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: true
  device: auto
  seed: 42
  lr_schedule: wsd
  wsd_decay_start: 0.8
  ckpt_every: 200                    # spot preemption insurance

logging:
  run_name: aria_v1_1b_fwe
  checkpoint_dir: ./checkpoints/aria_v1_1b_fwe
  log_every: 50
