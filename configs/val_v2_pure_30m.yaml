# Phase 2a validation: LSA v2 (Gated DeltaNet), no interleave
# Params: 31.99M (matched to baseline 31.69M within 0.9%)
# Same data/training as Phase 1 for direct comparison.
model:
  name: lsa_v2
  vocab_size: 50257
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  d_ff: 500                       # tuned down to absorb GDN's extra projections
  d_kv_latent: 192
  d_state: 192                    # kept for API compat; unused by v2 recurrence
  max_seq_len: 512
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true

data:
  dataset: wikitext-103
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 512
  train_split: 0.95
  max_train_tokens: 50000000

training:
  batch_size: 4
  grad_accum_steps: 8             # effective batch still 32; GDN matrix state needs more memory
  max_steps: 8000
  eval_every: 400
  eval_iters: 50
  warmup_steps: 400
  lr: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: true
  device: auto
  seed: 42

logging:
  run_name: val_v2_pure_30m
  checkpoint_dir: ./checkpoints/val_v2_pure_30m
  log_every: 50
