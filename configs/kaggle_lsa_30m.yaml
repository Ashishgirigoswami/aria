# Kaggle-scale LSA: ~30M params on wikitext-103 BPE
# Target hardware: P100 16GB or T4 16GB (Kaggle free tier)
# Expected wall time: ~10-15 hours across 2-3 Kaggle sessions
model:
  name: lsa
  vocab_size: 50257           # gpt2 BPE
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  d_ff: 1024
  d_kv_latent: 192            # low-rank compression (50% of d_model)
  d_state: 192                # selective SSM state
  max_seq_len: 1024
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true

data:
  dataset: wikitext-103
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 1024               # 4x larger context than Phase 0 prototype
  train_split: 0.95           # wikitext has a dedicated val split already
  max_train_tokens: 50000000  # 50M tokens — fits in Kaggle session time budget

training:
  batch_size: 8
  grad_accum_steps: 4         # effective batch 32
  max_steps: 20000
  eval_every: 500
  eval_iters: 100
  warmup_steps: 500
  lr: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: true                   # P100 & T4 both support FP16 autocast
  device: auto
  seed: 42

logging:
  run_name: kaggle_lsa_30m
  checkpoint_dir: ./checkpoints/kaggle_lsa_30m
  log_every: 50
