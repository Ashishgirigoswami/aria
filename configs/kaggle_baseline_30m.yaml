# Kaggle-scale matched baseline: ~30M params to match lsa_30m
model:
  name: baseline
  vocab_size: 50257
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  d_ff: 1280                  # tuned up to match LSA's extra SSM projections
  max_seq_len: 1024
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true

data:
  dataset: wikitext-103
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 1024
  train_split: 0.95
  max_train_tokens: 50000000

training:
  batch_size: 8
  grad_accum_steps: 4
  max_steps: 20000
  eval_every: 500
  eval_iters: 100
  warmup_steps: 500
  lr: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: true
  device: auto
  seed: 42

logging:
  run_name: kaggle_baseline_30m
  checkpoint_dir: ./checkpoints/kaggle_baseline_30m
  log_every: 50
