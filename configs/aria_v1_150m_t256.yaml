# ARIA v1 (LSA vector SSM) 150M on wikitext-103 — seq_len=256
# v1 uses xla_scan for BOTH forward and backward (vector state Mamba-2 style).
# Expected 10x faster than v2's Python-loop backward on TPU.
model:
  name: lsa
  vocab_size: 50257
  d_model: 768
  n_layers: 12
  n_heads: 12
  d_head: 64
  d_ff: 2200
  d_kv_latent: 384
  d_state: 192
  max_seq_len: 256
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true
  interleave_ratio: 3

data:
  dataset: wikitext-103
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 256
  train_split: 0.98
  max_train_tokens: 50000000

training:
  batch_size: 4
  grad_accum_steps: 16
  max_steps: 8000
  eval_every: 400
  eval_iters: 50
  warmup_steps: 500
  lr: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: true
  device: auto
  seed: 42
  lr_schedule: wsd
  wsd_decay_start: 0.8
  ckpt_every: 200

logging:
  run_name: aria_v1_150m_t256
  checkpoint_dir: ./checkpoints/aria_v1_150m_t256
  log_every: 50
