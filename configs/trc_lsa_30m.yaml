# TRC / TPU: 30M LSA on wikitext-103 BPE
# Target: Cloud TPU v3-8, v4-8, or v5e-8 (single slice).
# Throughput estimate: ~2-4 hours for 20k steps at 1024 context on v4-8.
model:
  name: lsa
  vocab_size: 50257
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  d_ff: 1024
  d_kv_latent: 192
  d_state: 192
  max_seq_len: 1024
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true

data:
  dataset: wikitext-103
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 1024
  train_split: 0.95
  max_train_tokens: 50000000

training:
  batch_size: 32                # TPUs prefer larger static batches
  grad_accum_steps: 2           # effective batch 64
  max_steps: 20000
  eval_every: 500
  eval_iters: 100
  warmup_steps: 500
  lr: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  seed: 42

logging:
  run_name: trc_lsa_30m
  checkpoint_dir: ./checkpoints/trc_lsa_30m
  log_every: 50
