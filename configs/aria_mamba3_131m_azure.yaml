# ARIA LSA + Mamba-3 131M — Azure A100 ablation vs v1
#
# Matched to configs/aria_v1_150m_t256.yaml for fair comparison:
#   - same d_model, n_layers, d_head, d_ff, d_kv_latent, max_seq_len
#   - same seed=42, same data (wikitext-103 50M tokens)
#   - same optimizer + LR + WSD schedule + steps
# ONLY difference: SSM primitive (Mamba-2 vector state -> Mamba-3 matrix state)
#
# Runs on CUDA (A100/H100). NOT compatible with TPU — Mamba-3 needs CUDA kernels.

model:
  name: lsa_mamba3
  vocab_size: 50257
  d_model: 768
  n_layers: 12
  n_heads: 12
  d_head: 64
  d_ff: 2200
  d_kv_latent: 384
  d_state: 128
  max_seq_len: 256
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true
  interleave_ratio: 3
  qk_norm: false
  mamba3_headdim: 64
  mamba3_chunk_size: 16
  is_mimo: false                     # SISO first — simpler, lower risk
  mimo_rank: 4

data:
  dataset: wikitext-103
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 256
  train_split: 0.98
  max_train_tokens: 50000000

training:
  batch_size: 4
  grad_accum_steps: 16
  max_steps: 8000
  eval_every: 400
  eval_iters: 50
  warmup_steps: 500
  lr: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  seed: 42
  lr_schedule: wsd
  wsd_decay_start: 0.8
  ckpt_every: 100
  dtype: bf16                        # A100 native bf16

logging:
  run_name: aria_mamba3_131m_azure
  checkpoint_dir: /home/azureuser/aria/checkpoints/aria_mamba3_131m_azure
  log_every: 25
