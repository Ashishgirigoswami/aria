# 100-step smoke run — verifies the full training loop works end-to-end.
model:
  name: lsa
  vocab_size: 128
  d_model: 256
  n_layers: 6
  n_heads: 4
  d_head: 64
  d_ff: 684
  d_kv_latent: 128
  d_state: 128
  max_seq_len: 512
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true

data:
  dataset: tinyshakespeare
  cache_dir: ./data
  seq_len: 128
  train_split: 0.9

training:
  batch_size: 16
  grad_accum_steps: 1
  max_steps: 100
  eval_every: 50
  eval_iters: 20
  warmup_steps: 20
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: false
  device: auto
  seed: 42

logging:
  run_name: smoke_lsa
  checkpoint_dir: ./checkpoints/smoke_lsa
  log_every: 25
