# Phase 2a validation: LSA v1 + 3:1 interleaved full-attention blocks
# Params: 31.74M (matched to baseline 31.69M within 0.2%)
# Same data/training as Phase 1 for direct comparison.
model:
  name: lsa
  vocab_size: 50257
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  d_ff: 1100                      # tuned to match baseline at 31.69M
  d_kv_latent: 192
  d_state: 192
  max_seq_len: 512
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true
  interleave_ratio: 3             # every 4th block is pure full-attention

data:
  dataset: wikitext-103
  tokenizer: bpe
  cache_dir: ./data
  seq_len: 512
  train_split: 0.95
  max_train_tokens: 50000000

training:
  batch_size: 16
  grad_accum_steps: 2
  max_steps: 8000
  eval_every: 400
  eval_iters: 50
  warmup_steps: 400
  lr: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: true
  device: auto
  seed: 42

logging:
  run_name: val_v1_interleave_30m
  checkpoint_dir: ./checkpoints/val_v1_interleave_30m
  log_every: 50
