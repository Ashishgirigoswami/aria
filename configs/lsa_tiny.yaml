# LSA-Tiny: 8M parameter LSA prototype for GTX 1050
# Matched against baseline_tiny.yaml for fair comparison.

model:
  name: lsa
  vocab_size: 128          # char-level (actual vocab depends on data, padded to 128)
  d_model: 256
  n_layers: 6
  n_heads: 4
  d_head: 64
  d_ff: 684                # ~4 * d_model * 2/3 for SwiGLU parity
  d_kv_latent: 128         # MLA-style low-rank KV compression dim
  d_state: 128             # selective SSM state dim
  max_seq_len: 512
  dropout: 0.0
  rope_base: 10000.0
  tie_weights: true

data:
  dataset: tinyshakespeare
  cache_dir: ./data
  seq_len: 256
  train_split: 0.9

training:
  batch_size: 16
  grad_accum_steps: 2      # effective batch = 32
  max_steps: 3000
  eval_every: 200
  eval_iters: 50
  warmup_steps: 100
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  amp: false               # Pascal (GTX 1050) has no tensor cores — FP32 is fine
  device: auto             # auto / cuda / cpu
  seed: 42

logging:
  run_name: lsa_tiny
  checkpoint_dir: ./checkpoints/lsa_tiny
  log_every: 20
